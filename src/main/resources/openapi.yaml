openapi: "3.0.3"

info:
  title: "Tasks API"
  version: "1.0.0"
  description: "CRUD API for the Task table"

paths:
  /tasks:
    get:
      summary: "Get a paginated list of tasks"
      parameters:
        - name: "page"
          in: "query"
          description: "The page number to retrieve"
          required: false
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: "limit"
          in: "query"
          description: "The maximum number of tasks to return per page"
          required: false
          schema:
            type: "integer"
            default: 10
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: "A list of all tasks"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/Task"

    post:
      summary: "Create a new task"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: "Task created"

  /tasks/{id}:
    parameters:
      - name: "id"
        in: "path"
        required: true
        description: "The ID of the task"
        schema:
          type: "integer"

    get:
      summary: "Get a specific task"
      responses:
        "200":
          description: "Requested task"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: "Not found"

    put:
      summary: "Update a task"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: "Task updated"
        "404":
          description: "Not found"

    delete:
      summary: "Delete a task"
      responses:
        "200":
          description: "Task deleted"
        "404":
          description: "Not found"

components:
  schemas:
    Task:
      type: "object"
      required:
        - id
        - title
        - description
      properties:
        id:
          type: "integer"
          readOnly: true
        title:
          type: "string"
        description:
          type: "string"
        updatedAt:
          type: "string"
          format: "date-time"
          nullable: true
        isCompleted:
          type: "boolean"
          nullable: true

    TaskCreate:
      type: "object"
      required:
        - title
        - description
      properties:
        title:
          type: "string"
        description:
          type: "string"

    TaskUpdate:
      type: "object"
      required:
        - title
        - description
        - isCompleted
      properties:
        title:
          type: "string"
        description:
          type: "string"
        isCompleted:
          type: "boolean"
